<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BabyTracker</title>
  <link href="styles/index.css" rel="stylesheet" type="text/css">
</head>

<body>

<header class="topbar">

  <div class="logo">
    BabyTracker
  </div>

  <nav class="nav">
    <a href="dashboard.html">Dashboard</a>
  </nav>

  <div id="authSection" class="auth">
    <button id="googleLogin">Login met Google</button>
  </div>

  <div id="userBar" style="display:none;">
    <span id="userInfo"></span>
    <button id="logoutBtn">Logout</button>
  </div>

</header>

<!-- APP -->
<div id="appSection" style="display:none;">

  <div class="layout">

    <!-- LEFT: FORM -->
    <form id="activity-form">

      <label for="dag">Dag:</label>
      <input type="date" id="dag" required>

      <label for="activiteit">Activiteit:</label>
      <select id="activiteit" required>
        <option value="slaap">Slaap</option>
        <option value="voeding">Voeding</option>
        <option value="verversen">Verversen</option>
        <option value="draagzak">Draagzak</option>
        <option value="speelmat">Speelmat</option>
        <option value="bad">Bad</option>
        <option value="mama_tijd">Mama tijd</option>
        <option value="andere">Andere</option>
      </select>

      <label for="start">Start:</label>
      <input type="time" id="start" required>


      <label for="categorie">Categorie:</label>
      <input type="text" id="categorie" readonly>

      <button type="submit">Toevoegen</button>

    </form>

    <!-- RIGHT: OVERVIEW -->
    <div class="overview">

      <h2>Overzicht</h2>

      <!-- CALENDAR NAV -->
      <div class="calendar-nav">
        <button id="prevMonth">←</button>
        <h3 id="monthLabel"></h3>
        <button id="nextMonth">→</button>
      </div>

      <!-- WEEKDAYS -->
      <div class="weekdays">
        <div>ma</div>
        <div>di</div>
        <div>wo</div>
        <div>do</div>
        <div>vr</div>
        <div>za</div>
        <div>zo</div>
      </div>

      <!-- CALENDAR GRID -->

      <div id="calendar"></div>

      <h3 id="dagTitel">Selecteer een dag</h3>

      <!-- TABLE -->
      <table>
        <thead>
        <tr>
          <th>Dag</th>
          <th>Activiteit</th>
          <th>Start</th>
          <th>Einde</th>
          <th>Categorie</th>
          <th>Duur</th>
          <th>Acties</th>
        </tr>
        </thead>
        <tbody id="tabel"></tbody>
      </table>

    </div>

  </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
